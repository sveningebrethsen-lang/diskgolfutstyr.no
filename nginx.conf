server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  charset utf-8;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(css|js|json|png|jpg|jpeg|webp|svg|ico|txt|xml)$ {
    try_files $uri =404;
    access_log off;
    expires 1h;
    add_header Cache-Control "public";
  }
}
